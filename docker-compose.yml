version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173" # Expose Vite's dev server port
    volumes:
      # Mount the source code for hot-reloading
      - .:/app
      # Use a named volume for node_modules to persist them
      - node_modules:/app/node_modules
    # Override the Dockerfile's CMD to run the dev server
    command: npm run dev -- --host
    env_file:
      - .env

volumes:
  node_modules: